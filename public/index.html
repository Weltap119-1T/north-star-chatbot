<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>North Star Support</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest: #1a3a2a;
      --pine: #2d5a3d;
      --moss: #4a7c59;
      --sage: #8fbc8f;
      --cream: #f5f0e8;
      --stone: #e8e0d0;
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --white: #ffffff;
      --radius: 16px;
      --shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--forest);
      background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(45,90,61,0.4) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(26,58,42,0.6) 0%, transparent 60%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .chat-container {
      width: 100%;
      max-width: 480px;
      height: 700px;
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      background: var(--forest);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .avatar {
      width: 44px;
      height: 44px;
      background: var(--pine);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .header-info h1 {
      color: var(--white);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 2px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--sage);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status span {
      color: var(--sage);
      font-size: 12px;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: var(--cream);
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--stone); border-radius: 2px; }

    .message {
      display: flex;
      flex-direction: column;
      max-width: 82%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .bot .bubble {
      background: var(--white);
      color: var(--text);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .user .bubble {
      background: var(--forest);
      color: var(--white);
      border-bottom-right-radius: 4px;
    }

    .bubble strong { font-weight: 600; }

    /* Quick reply options */
    .options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      max-width: 340px;
    }

    .option-btn {
      background: var(--white);
      border: 1.5px solid var(--moss);
      color: var(--pine);
      padding: 7px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-weight: 500;
      white-space: nowrap;
    }

    .option-btn:hover {
      background: var(--pine);
      color: var(--white);
      border-color: var(--pine);
    }

    /* Typing indicator */
    .typing {
      display: none;
      align-items: center;
      gap: 4px;
      padding: 14px 16px;
      background: var(--white);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .typing.visible { display: flex; }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* Input area */
    .input-area {
      padding: 16px;
      background: var(--white);
      border-top: 1px solid var(--stone);
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      padding: 12px 16px;
      border: 1.5px solid var(--stone);
      border-radius: 24px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      transition: border-color 0.15s;
      color: var(--text);
    }

    #user-input:focus {
      border-color: var(--moss);
    }

    #user-input::placeholder {
      color: var(--muted);
    }

    #send-btn {
      width: 42px;
      height: 42px;
      background: var(--forest);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    #send-btn:hover { background: var(--pine); }
    #send-btn:disabled { background: var(--stone); cursor: default; }

    #send-btn svg {
      width: 18px;
      height: 18px;
      fill: var(--white);
      transform: translateX(1px);
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🌲</div>
      <div class="header-info">
        <h1>North Star Support</h1>
        <div class="status">
          <div class="status-dot"></div>
          <span>Online — ready to help</span>
        </div>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="message bot">
        <div class="typing visible" id="typing">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <textarea
        id="user-input"
        rows="1"
        placeholder="Type a message..."
        autocomplete="off"
      ></textarea>
      <button id="send-btn" disabled>
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
        </svg>
      </button>
    </div>
  </div>

  <script>
    let sessionId = null;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingEl = document.getElementById('typing');

    function renderMarkdown(text) {
      return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    }

    function showTyping() {
      typingEl.classList.add('visible');
      scrollToBottom();
    }

    function hideTyping() {
      typingEl.classList.remove('visible');
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMessage(text, role, options = []) {
      const msgDiv = document.createElement('div');
      msgDiv.className = `message ${role}`;

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerHTML = renderMarkdown(text);
      msgDiv.appendChild(bubble);

      if (role === 'bot' && options.length) {
        const optsDiv = document.createElement('div');
        optsDiv.className = 'options';
        options.forEach(opt => {
          const btn = document.createElement('button');
          btn.className = 'option-btn';
          btn.textContent = opt;
          btn.onclick = () => sendMessage(opt);
          optsDiv.appendChild(btn);
        });
        msgDiv.appendChild(optsDiv);
      }

      messagesEl.insertBefore(msgDiv, typingEl.parentElement);
      scrollToBottom();
    }

    async function init() {
      showTyping();
      const res = await fetch('/api/session', { method: 'POST' });
      const data = await res.json();
      sessionId = data.sessionId;

      await new Promise(r => setTimeout(r, 700));
      hideTyping();

      const welcome = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: 'hello' }),
      });
      const msg = await welcome.json();
      addMessage(msg.message, 'bot', msg.options || []);
      sendBtn.disabled = false;
    }

    async function sendMessage(text) {
      if (!text.trim() || !sessionId) return;

      addMessage(text, 'user');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      showTyping();
      await new Promise(r => setTimeout(r, 500 + Math.random() * 400));

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId, message: text }),
      });
      const data = await res.json();
      hideTyping();
      addMessage(data.message, 'bot', data.options || []);
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', () => sendMessage(inputEl.value));

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(inputEl.value);
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    });

    init();
  </script>
</body>
</html>
